name: Build and Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel older runs for the same branch when a new commit lands.
concurrency:
  group: build-and-push-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_PREFIX: ${{ secrets.DOCKERHUB_USERNAME }}/steam-diploma

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    # Payload CMS connects to MongoDB during `next build` to introspect its
    # collections, so the database has to be reachable from the build.
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok' || exit 1"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Wait for MongoDB
        run: |
          for i in {1..30}; do
            if (echo > /dev/tcp/localhost/27017) 2>/dev/null; then
              echo "MongoDB is reachable"
              exit 0
            fi
            echo "Waiting for MongoDB... ($i)"
            sleep 1
          done
          echo "MongoDB did not become reachable in time" >&2
          exit 1

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: true
          network: host
          build-args: |
            PAYLOAD_SECRET=${{ secrets.PAYLOAD_SECRET }}
            MONGODB_URI=mongodb://localhost:27017/steam_build
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
          tags: |
            ${{ env.IMAGE_PREFIX }}-web:latest
            ${{ env.IMAGE_PREFIX }}-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push bot
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.bot
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-bot:latest
            ${{ env.IMAGE_PREFIX }}-bot:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
