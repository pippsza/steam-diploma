name: Build and Push Docker Images

on:
  push:
    branches: [main]

env:
  IMAGE_PREFIX: ${{ secrets.DOCKERHUB_USERNAME }}/steam-diploma

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    # MongoDB потрібна для Payload CMS під час next build
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: true
          network: host
          build-args: |
            PAYLOAD_SECRET=${{ secrets.PAYLOAD_SECRET }}
            MONGODB_URI=mongodb://localhost:27017/steam_build
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
          tags: |
            ${{ env.IMAGE_PREFIX }}-web:latest
            ${{ env.IMAGE_PREFIX }}-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push bot
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.bot
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-bot:latest
            ${{ env.IMAGE_PREFIX }}-bot:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
